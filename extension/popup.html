<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      width: 320px;
      background: #0a0a0f;
      color: #f1f5f9;
      padding: 20px;
    }

    .header {
      text-align: center;
      padding-bottom: 16px;
      border-bottom: 1px solid #2a2a3a;
      margin-bottom: 16px;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .header p {
      font-size: 11px;
      color: #64748b;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px;
      background: #1a1a25;
      border-radius: 8px;
      margin-bottom: 16px;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #64748b;
    }

    .status-dot.active {
      background: #22c55e;
      box-shadow: 0 0 10px rgba(34, 197, 94, 0.5);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .status-text {
      font-size: 13px;
      color: #94a3b8;
    }

    .device-info {
      background: #12121a;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 16px;
      font-size: 12px;
    }

    .device-info label {
      color: #64748b;
      display: block;
      margin-bottom: 4px;
      text-transform: uppercase;
      font-size: 10px;
      letter-spacing: 0.5px;
    }

    .device-id {
      font-family: 'JetBrains Mono', monospace;
      color: #3b82f6;
      word-break: break-all;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 16px;
    }

    .stat-box {
      background: #1a1a25;
      border-radius: 8px;
      padding: 12px;
      text-align: center;
    }

    .stat-value {
      display: block;
      font-size: 20px;
      font-weight: 700;
      color: #3b82f6;
    }

    .stat-label {
      font-size: 10px;
      color: #64748b;
      text-transform: uppercase;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-start {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: white;
    }

    .btn-start:hover {
      box-shadow: 0 4px 15px rgba(34, 197, 94, 0.3);
    }

    .btn-stop {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      color: white;
    }

    .btn-stop:hover {
      box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3);
    }

    .admin-link {
      display: block;
      text-align: center;
      margin-top: 12px;
      font-size: 12px;
      color: #64748b;
      text-decoration: none;
    }

    .admin-link:hover {
      color: #3b82f6;
    }

    .note {
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid #2a2a3a;
      font-size: 11px;
      color: #64748b;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Keyboard Monitor</h1>
    <p>Parental Control Extension</p>
  </div>

  <div class="status">
    <span class="status-dot" id="statusDot"></span>
    <span class="status-text" id="statusText">Status: Loading...</span>
  </div>

  <div class="device-info">
    <label>Device ID</label>
    <span class="device-id" id="deviceId">Loading...</span>
  </div>

  <div class="stats">
    <div class="stat-box">
      <span class="stat-value" id="todayKeys">-</span>
      <span class="stat-label">Today</span>
    </div>
    <div class="stat-box">
      <span class="stat-value" id="totalKeys">-</span>
      <span class="stat-label">Total</span>
    </div>
  </div>

  <button id="toggleBtn" class="btn-start">Start Monitoring</button>

  <a href="#" id="adminLink" class="admin-link">Open Admin Dashboard</a>

  <div class="note">
    This extension captures keyboard activity across all browser tabs for parental control purposes. Password fields are not recorded for security.
  </div>

  <script src="popup.js"></script>
</body>
</html>
